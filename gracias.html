<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Bienvenido a Misti! | Registro Confirmado</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .success-container {
            text-align: center;
            padding: 40px 20px;
        }
        .icon-check {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 20px;
            display: block;
        }
        .thanks-title {
            font-family: 'Baloo 2', cursive;
            font-size: 2.5rem;
            color: var(--text-white);
            margin-bottom: 10px;
        }
        .thanks-p {
            color: var(--text-gray);
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .btn-back {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            margin: 10px;
        }
        .btn-back:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }
        .btn-outline {
            display: inline-block;
            background: transparent;
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
            margin: 10px;
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="noise"></div>
    <div class="glow"></div>

    <main class="container">
        <div class="success-container">
            <i class="fas fa-microphone-alt icon-check"></i>
            <h1 class="thanks-title">¡Ya estás dentro!</h1>
            <p class="thanks-p">
                Tu plaza como miembro fundador de **Misti** ha sido reservada con éxito. 
                Te enviaremos un email con el codigo en cuanto este listo para utilizar en tu ciudad.
            </p>

            <div class="action-buttons">
                <a href="index.html" class="btn-back">Volver al inicio</a>
                <a href="https://www.instagram.com/mistiappoficial/" target="_blank" class="btn-outline">
                    <i class="fab fa-instagram"></i> Síguenos en IG
                </a>
            </div>
        </div>

        <footer class="footer" style="margin-top: 100px;">
            <p class="status">El futuro de las conexiones es sonoro.</p>
            <div class="legal-footer">
                <span>© Misti 2025</span>
            </div>
        </footer>
    </main>

</body>
</html>
